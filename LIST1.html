<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    
    <h2>unordered list</h2>
    <ul type="square">
        <li>one</li>
        <li>two</li>
        <li>three</li>
    </ul>
    <h5>ordered list</h5>
    
    <ol type="1">
        <li>one</li>
        <li>two</li>
        <li>three</li>
    </ol>
    <h6>definition list</h6>
    <d1>
        <dt>JS:</dt>
        <dd>javascript</dd>
        <dt>JS:</dt>
        <dd>javascript</dd>
        <dt>JS:</dt>
        <dd>javascript</dd>
    </d1>
</body>
</html>
